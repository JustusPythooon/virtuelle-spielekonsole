<!DOCTYPE html>
<html lang='de'>
<head>
<meta charset='UTF-8'>
<title>Virtual Console</title>
<link rel='stylesheet' href='style.css'>
</head>
<body onload='boot()'>
<div id='boot-screen'>🎮 Virtual Console</div>
<header class='top-bar' id='main-ui' hidden>
  <div class='profile'><span id='avatar'>🤖</span> Julius | Coins: <span id='coinDisplay'>100</span></div>
  <div class='time' id='time'></div>
</header>
<main class='menu' id='menu' hidden>
  <div class='tile' onclick="openApp('games')">🎮<span>Spiele</span></div>
  <div class='tile' onclick="openApp('shop')">🛒<span>eShop</span></div>
  <div class='tile' onclick="openApp('settings')">⚙️<span>Einstellungen</span></div>
</main>
<section id='app-view'></section>
<script src='https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js'></script>
<script src='app.js'></script>
</body>
</html>
